apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: web-service
  labels:
    app.kubernetes.io/name: web-service
    app.kubernetes.io/component: proxy
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
