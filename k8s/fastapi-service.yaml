apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: web-service
  labels:
    app.kubernetes.io/name: web-service
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: fastapi
  ports:
    - name: http
      port: 8000
      targetPort: 8000
