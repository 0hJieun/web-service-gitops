apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: web-service

resources:
  - namespace.yaml
  - fastapi-deployment.yaml
  - fastapi-service.yaml
  - nginx-configmap.yaml
  - nginx-deployment.yaml
  - nginx-service.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: infra-test-web-service

images:
  - name: web-service-api
    newName: docker.io/jieun3113/web-service-api
    newTag: "deee602bb8e201273f6072528e37181124d61fa8"
